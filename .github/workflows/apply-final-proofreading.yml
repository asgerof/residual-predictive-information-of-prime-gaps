name: Apply final proofreading snippets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply snippets to paper.tex
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('paper.tex')
          text = path.read_text(encoding='utf-8')

          intro_anchor = """This paper asks a relative and predictive question: after specified arithmetic structure has been built into an explicit online null model, does previous prime-gap history improve prediction of the next gap? This formulation is intentionally narrower than asking whether prime gaps are random or compressible. A residual learner should not receive credit for rediscovering arithmetic information that the baseline failed to encode. For example, a local-density model that ignores small-prime congruence constraints is too weak: a flexible residual model can detect the omitted wheel structure and obtain a large code gain. That gain is real relative to the weak baseline, but it is not evidence for residual sequential information beyond known arithmetic structure.
"""
          related = """The question also differs from existing studies of prime-gap correlations, consecutive-prime biases, entropy-like statistics, or compression of prime-derived sequences \\citep{lemkeoliver2016,kumar2003}. Those studies ask whether prime-derived data display structure relative to a chosen statistical summary or heuristic model. Here the target is operational and relative: before each gap is revealed, a declared arithmetic baseline has already assigned a probability distribution, and a residual learner receives credit only if previous gap history shortens the prequential code after that baseline and after its own complexity penalty. Thus the experiment is not an absolute randomness test for the primes. It is a test of residual online predictive gain after specified arithmetic information has been made explicit.
"""
          if related.strip() not in text:
              text = text.replace(intro_anchor + "\nThe protocol developed here", intro_anchor + "\n" + related + "\nThe protocol developed here", 1)

          repro_anchor = """The repository pins the paper-scale artifacts in \\texttt{experiments/final\\_manifest.json}, derives headline metrics in \\texttt{experiments/final\\_metrics.json}, regenerates a compact report in \\texttt{experiments/final\\_report.md}, validates artifact completeness and consistency using \\texttt{experiments/validate\\_paper\\_artifacts.py}, audits cross-exponent robustness using \\texttt{experiments/rpi\\_robustness\\_audit.py}, and generates paper figures using \\texttt{experiments/rpi\\_paper\\_figures.py}. These checks are intended to make the empirical claim reproducible from committed artifacts without rerunning the long simulations."""
          exact_sentence = " Exact machine-readable values are preserved in \\texttt{experiments/final\\_metrics.json}; the manuscript rounds some displayed values for readability."
          if exact_sentence.strip() not in text:
              text = text.replace(repro_anchor, repro_anchor + exact_sentence, 1)

          old_table = r"""\begin{table}[ht]
\centering
\small
\begin{tabular}{lll}
\toprule
Quantity at $X=2^{26}$ & Value & Interpretation \\
\midrule
Main $B_1(11)$ bucket residual & $-2.7429243523407067\cdot10^{-7}$ bits/gap & Null-level \\
Main $B_1(11)$ null 5--95\% interval & $[-2.7445474076652,-2.7406420776259464]\cdot10^{-7}$ & Real value inside band \\
Rank-mod-64 CTW under $B_0$ & $0.2674244536300398$ bits/gap & Strong positive control \\
Rank-mod-64 CTW under $B_1(11)$ & $-2.742924352340597\cdot10^{-7}$ bits/gap & Null-level \\
Exact $B_0$ code length & $4.563439906212204$ bits/gap & Weak baseline \\
Exact $B_1(11)$ code length & $3.1704284777012335$ bits/gap & Wheel baseline \\
$B_0-B_1(11)$ improvement & $1.3930114285109703$ bits/gap & Wheel structure absorbed \\
\bottomrule
\end{tabular}
\caption{Headline paper-scale metrics at $X=2^{26}$.}
\label{tab:headline-results}
\end{table}"""
          new_table = r"""\begin{table}[ht]
\centering
\small
\begin{tabular}{p{0.36\linewidth}p{0.30\linewidth}p{0.24\linewidth}}
\toprule
Quantity at $X=2^{26}$ & Value & Interpretation \\
\midrule
Main $B_1(11)$ bucket residual & $-2.7429\cdot10^{-7}$ bits/gap & Null-level \\
Main $B_1(11)$ null 5--95\% interval & $[-2.7445,-2.7406]\cdot10^{-7}$ & Real value inside band \\
Rank-mod-64 CTW under $B_0$ & $0.2674$ bits/gap & Strong positive control \\
Rank-mod-64 CTW under $B_1(11)$ & $-2.7429\cdot10^{-7}$ bits/gap & Null-level \\
Exact $B_0$ code length & $4.5634$ bits/gap & Weak baseline \\
Exact $B_1(11)$ code length & $3.1704$ bits/gap & Wheel baseline \\
$B_0-B_1(11)$ improvement & $1.3930$ bits/gap & Wheel structure absorbed \\
\bottomrule
\end{tabular}
\caption{Headline paper-scale metrics at $X=2^{26}$. Values are rounded for readability; exact values are stored in \texttt{experiments/final\_metrics.json}.}
\label{tab:headline-results}
\end{table}"""
          if new_table not in text:
              text = text.replace(old_table, new_table, 1)

          discussion_anchor = """The negative result is informative because the protocol contains its own positive control. A residual test that never detects anything would be unconvincing; a residual test that detects structure under a weak baseline but loses that signal under a stronger arithmetic null is more credible. The comparison shows that the residual machinery is sensitive, but also that the main positive signal is not stable under a fairer baseline.
"""
          reviewer = """Several reviewer objections are therefore addressed by design rather than by rhetoric. If the concern is that the residual models are too weak to find any signal, the $B_0$ positive control shows that they can find omitted arithmetic structure. If the concern is that the negative result is merely an endpoint accident, the cross-exponent audit checks the same qualitative pattern across dyadic windows. If the concern is that $B_1(11)$ is not a complete model of prime gaps, that concern is accepted: the claim is deliberately only beyond this declared wheel-first-hit baseline and the tested residual predictors, not beyond all arithmetic null models.
"""
          if reviewer.strip() not in text:
              text = text.replace(discussion_anchor + "\nThe result also clarifies", discussion_anchor + "\n" + reviewer + "\nThe result also clarifies", 1)

          checks = [
              related.strip(),
              exact_sentence.strip(),
              "\\begin{tabular}{p{0.36\\linewidth}p{0.30\\linewidth}p{0.24\\linewidth}}",
              reviewer.strip(),
          ]
          missing = [c[:80] for c in checks if c not in text]
          if missing:
              raise SystemExit(f"Missing expected applied snippets: {missing}")

          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-final-proofreading.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit applied snippets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add paper.tex .github/workflows/apply-final-proofreading.yml
            git commit -m "Apply final proofreading snippets"
            git push
          else
            echo "No changes to commit."
          fi
