name: Neutralize Zenodo DOI self-reference loop

on:
  push:
    paths:
      - '.github/workflows/neutralize-zenodo-loop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-release-metadata:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch DOI/version-specific repository text
        run: |
          python - <<'PY'
          from pathlib import Path

          # CITATION.cff: keep citation metadata, but avoid embedding a DOI that
          # Zenodo mints only after the archive is created.
          citation = Path('CITATION.cff')
          text = citation.read_text(encoding='utf-8')
          text = text.replace('doi: "10.5281/zenodo.21073161"\n', '')
          text = text.replace('date-released: "2026-06-30"', 'date-released: "2026-07-01"')
          text = text.replace('version: "0.1.0"', 'version: "0.1.1"')
          citation.write_text(text, encoding='utf-8')

          # README: avoid hard-coded version DOI/current-release statement.
          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace(
              'Archived release: `v0.1.0`, DOI `10.5281/zenodo.21073161`.\n',
              'Archived releases are available through Zenodo via the GitHub release archive. For exact reproducibility, cite the version-specific DOI shown on Zenodo for the GitHub release used.\n'
          )
          text = text.replace(
              '- `CITATION.cff`: citation metadata crediting Asger Othmar Frøhlich, version\n  `0.1.0`, release date `2026-06-30`, and DOI `10.5281/zenodo.21073161`.\n- `ARCHIVAL_RELEASE.md`: release-note and DOI maintenance procedure for future\n  versions.\n\nUse the DOI-linked release when citing the archived repository record.\n',
              '- `CITATION.cff`: citation metadata crediting Asger Othmar Frøhlich and the intended release version.\n- `ARCHIVAL_RELEASE.md`: release-note and archival procedure for DOI-linked versions.\n\nUse the version-specific DOI shown on Zenodo when citing an archived GitHub release. The repository files intentionally avoid embedding a newly minted same-version DOI, which prevents a DOI-only self-reference loop.\n'
          )
          readme.write_text(text, encoding='utf-8')

          # Manuscript availability statement: point to GitHub and the release DOI
          # shown on Zenodo, without hard-coding the current same-version DOI.
          paper = Path('paper.tex')
          text = paper.read_text(encoding='utf-8')
          text = text.replace(
              'The code, manuscript sources, pinned paper-scale artifacts, generated figures, validation scripts, final metrics, and reproducibility workflows are available in the repository \\url{https://github.com/asgerof/residual-predictive-information-of-prime-gaps}. The archived release is available at \\url{https://doi.org/10.5281/zenodo.21073161}.',
              'The code, manuscript sources, pinned paper-scale artifacts, generated figures, validation scripts, final metrics, and reproducibility workflows are available in the repository \\url{https://github.com/asgerof/residual-predictive-information-of-prime-gaps}. Archived releases are available through Zenodo; for exact reproducibility, cite the version-specific DOI shown on Zenodo for the GitHub release used.'
          )
          paper.write_text(text, encoding='utf-8')

          # Archival guide: replace the current-release DOI wording with a stable
          # procedure that explicitly avoids creating a self-reference loop.
          archival = Path('ARCHIVAL_RELEASE.md')
          archival.write_text('''# Archival Release Guide

This file describes the release and Zenodo archival procedure for this repository.
It intentionally avoids hard-coding a same-version Zenodo DOI in the repository
files before the final archive is created. Zenodo mints the version-specific DOI
after the GitHub release exists, so embedding that DOI back into the same archived
snapshot would create an unnecessary DOI-only release loop.

## Release candidate checklist

Before creating an archival release or submission update:

1. Confirm the following GitHub Actions workflows are green on the release commit:
   - `Reproducibility`
   - `Artifact validation`
   - `Manuscript build`
2. Download the `paper-pdf` artifact from the `Manuscript build` workflow and inspect it manually.
3. Confirm that `experiments/final_report.md` and `experiments/final_metrics.json` regenerate without a diff.
4. Confirm the paper-scale artifact directories listed in `experiments/final_manifest.json` are present.
5. Confirm the manuscript claim remains finite-scale and model-class-specific.
6. Confirm that `CITATION.cff`, the README citation guidance, and the manuscript availability statement do not contain a stale version-specific Zenodo DOI.

## Intended final release

Recommended release tag:

```text
v0.1.1
```

Recommended release title:

```text
Residual Predictive Information in Prime Gaps v0.1.1
```

Canonical release-note wording:

```markdown
Final paper-scale release for the residual predictive information of prime gaps study.

This release contains:

- the LaTeX manuscript source (`paper.tex`) and bibliography (`references.bib`);
- generated paper figures in PDF, SVG, and PNG format;
- pinned paper-scale artifacts through `X = 2^26`;
- final machine-readable metrics and compact final report;
- validation, robustness-audit, and figure-generation scripts;
- GitHub Actions workflows for reproducibility, artifact validation, and manuscript PDF build.

Main scoped conclusion:

A prequential residual-coding protocol detects strong missing arithmetic structure under the weak `B0` baseline, but under the tested online residual predictors it finds no robust positive residual predictive information beyond the `B1(11)` wheel-first-hit baseline up to `X = 2^26`.

This is a finite-scale empirical/methodological result. It is not an asymptotic theorem and not a claim that prime gaps contain no residual information.
```

## DOI handling without a loop

For the final release:

1. Create the GitHub release from the final checked commit.
2. Let Zenodo archive that GitHub release and mint the version-specific DOI.
3. Use the DOI shown on the Zenodo record and GitHub release page when citing that archived version.
4. Do not create another release only to embed the newly minted DOI back into the same repository files.

A later repository edit may mention the DOI on `main`, but that is live repository metadata. It is not necessary to create a new archive unless scientific content, manuscript text, figures, code, or pinned artifacts change.

## What cannot be inferred from the release

Preserve the following limitations in any release notes, preprint upload, or submission cover text:

- the main result is finite-scale through `X = 2^26`;
- the negative result is specific to the tested residual predictors;
- `B1(11)` is a wheel-first-hit baseline, not a complete Hardy--Littlewood or global analytic model;
- the implemented `B2` diagnostics are not exhaustive;
- the 200 stop-time null replicates support a controlled finite-scale study, not extreme-tail claims.
''', encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: git rm .github/workflows/neutralize-zenodo-loop.yml

      - name: Commit metadata-loop cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --cached -- .github/workflows/neutralize-zenodo-loop.yml || true
          git diff -- README.md CITATION.cff ARCHIVAL_RELEASE.md paper.tex || true
          git add README.md CITATION.cff ARCHIVAL_RELEASE.md paper.tex
          git commit -m "Avoid Zenodo DOI self-reference loop" || exit 0
          git push
