name: Apply code availability layout fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shorten Code and Data Availability paragraph
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('paper.tex')
          text = path.read_text(encoding='utf-8')

          marker = '\\section{Code and Data Availability}\n\n'
          start = text.index(marker) + len(marker)
          end_marker = '\n\nBefore archival release'
          end = text.index(end_marker, start)

          replacement = r"""The code, manuscript sources, pinned paper-scale artifacts, generated figures, validation scripts, final metrics, and reproducibility workflows are available in the repository \url{https://github.com/asgerof/residual-predictive-information-of-prime-gaps}.

The reported numbers are pinned by the final manifest, and the compact report is regenerated from that manifest. The validation and robustness-audit scripts check artifact completeness, metric consistency, and the cross-exponent qualitative conclusion. Long simulations are not rerun by default; the committed artifacts are the reproducible paper-scale record."""

          text = text[:start] + replacement + text[end:]
          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-code-availability-layout-fix.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit layout fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add paper.tex .github/workflows/apply-code-availability-layout-fix.yml
            git commit -m "Shorten code availability paragraph"
            git push
          else
            echo "No changes to commit."
          fi
