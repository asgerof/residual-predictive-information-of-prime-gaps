name: Manuscript build

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-paper:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Regenerate manuscript figures
        run: python experiments/rpi_paper_figures.py

      - name: Build paper.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex
          latexmk_shell_escape: false

      - name: Check paper.pdf exists
        run: test -s paper.pdf

      - name: Upload paper.pdf artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper.pdf
