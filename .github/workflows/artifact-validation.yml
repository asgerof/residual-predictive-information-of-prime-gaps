name: Artifact validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-paper-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile validation/report scripts
        run: |
          python -m py_compile \
            experiments/rpi_final_report.py \
            experiments/rpi_paper_figures.py \
            experiments/validate_paper_artifacts.py \
            experiments/rpi_robustness_audit.py

      - name: Validate pinned paper artifacts
        run: python experiments/validate_paper_artifacts.py
